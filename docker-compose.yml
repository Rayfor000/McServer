            MOTD: 'Charles James "Charlie" Kirk'
            ICON: https://raw.githubusercontent.com/Rayfor000/test/main/server-icon.png
            OVERRIDE_ICON: true
            MAX_PLAYERS: 67
            ONLINE_MODE: false
            PAUSE_WHEN_EMPTY_SECONDS: -1
            PLAYER_IDLE_TIMEOUT: 0
            RESOURCE_PACK_ENFORCE: true

            # --- 遊戲機制設定 ---
            ALLOW_FLIGHT: true
            DIFFICULTY: hard
            MAX_CHAINED_NEIGHBOR_UPDATES: 10000
            SIMULATION_DISTANCE: 8
