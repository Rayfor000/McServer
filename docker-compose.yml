    mcs_plugin:
        container_name: divinemc
        image: itzg/minecraft-server:java25-graalvm
        tty: true
        stdin_open: true
        ports: ['25585:25565']
        volumes: ['./data/mc:/data']

        environment:
            UID: 1000
            GID: 1000

