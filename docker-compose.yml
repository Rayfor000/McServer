            EULA: true
            TYPE: CUSTOM
            CUSTOM_SERVER: https://files.bxteam.org/divinemc/versions/1.21.11/27/divinemc-1.21.11-27.jar
            # VERSION: 1.21.11
            MEMORY: 6144M
